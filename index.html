<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emory DSCI Faculty Research Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0e17;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
  }

  #header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 16px 24px;
    background: linear-gradient(180deg, rgba(10,14,23,0.95) 0%, rgba(10,14,23,0) 100%);
    pointer-events: none;
  }

  #header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
    pointer-events: auto;
  }

  #header p {
    font-size: 13px;
    color: #888;
    margin-top: 2px;
    pointer-events: auto;
  }

  #graph { width: 100%; height: 100vh; }

  /* Legend */
  #legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 10;
    background: rgba(15,20,30,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 18px;
    backdrop-filter: blur(10px);
  }

  #legend h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .legend-item:hover { color: #fff; }
  .legend-item.dimmed { opacity: 0.3; }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    z-index: 20;
    background: rgba(15,20,30,0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 14px 18px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 340px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #tooltip.visible { opacity: 1; }

  #tooltip h4 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }

  #tooltip .area-tags {
    margin-bottom: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  #tooltip .area-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
  }

  #tooltip .stat {
    font-size: 12px;
    color: #888;
    margin-bottom: 2px;
  }

  #tooltip .topics {
    font-size: 11px;
    color: #666;
    margin-top: 6px;
    line-height: 1.5;
  }

  /* Edge tooltip */
  #edge-tooltip {
    position: fixed;
    z-index: 20;
    background: rgba(15,20,30,0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 14px 18px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 360px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #edge-tooltip.visible { opacity: 1; }

  #edge-tooltip h4 {
    font-size: 14px;
    color: #fff;
    margin-bottom: 8px;
  }

  #edge-tooltip .edge-detail {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 3px;
  }

  #edge-tooltip .paper-list {
    font-size: 11px;
    color: #666;
    margin-top: 6px;
    line-height: 1.5;
  }

  /* Controls */
  #controls {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 10;
    display: flex;
    gap: 8px;
  }

  .ctrl-btn {
    background: rgba(15,20,30,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: #aaa;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.15s;
  }

  .ctrl-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
  .ctrl-btn.active { color: #fff; background: rgba(80,120,255,0.2); border-color: rgba(80,120,255,0.4); }

  /* Edge weight slider */
  #weight-control {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    background: rgba(15,20,30,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 18px;
    backdrop-filter: blur(10px);
  }

  #weight-control label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    display: block;
    margin-bottom: 6px;
  }

  #weight-control input[type=range] {
    width: 180px;
    accent-color: #5078ff;
  }

  #weight-control .val {
    font-size: 12px;
    color: #aaa;
    margin-top: 4px;
  }

  /* Detail panel */
  #detail-panel {
    position: fixed;
    top: 0;
    right: -400px;
    width: 380px;
    height: 100vh;
    z-index: 30;
    background: rgba(12,16,26,0.95);
    border-left: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(16px);
    transition: right 0.25s ease;
    display: flex;
    flex-direction: column;
  }

  #detail-panel.open { right: 0; }

  #detail-panel .panel-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
  }

  #detail-panel .panel-header h3 {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
    margin-right: 12px;
  }

  #detail-panel .panel-close {
    background: none;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #888;
    font-size: 18px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  #detail-panel .panel-close:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

  #detail-panel .panel-body {
    padding: 16px 20px;
    overflow-y: auto;
    flex: 1;
  }

  #detail-panel .panel-section {
    margin-bottom: 18px;
  }

  #detail-panel .panel-section h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    margin-bottom: 8px;
  }

  #detail-panel .panel-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
  }

  #detail-panel .panel-tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 4px;
  }

  #detail-panel .panel-stat {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 4px;
  }

  #detail-panel .panel-stat strong { color: #ddd; }

  #detail-panel .panel-link {
    font-size: 12px;
    color: #5b8def;
    text-decoration: none;
    display: inline-block;
    margin-bottom: 4px;
  }

  #detail-panel .panel-link:hover { color: #7da8ff; text-decoration: underline; }

  #detail-panel .paper-item {
    font-size: 12px;
    color: #bbb;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  #detail-panel .paper-item .paper-title { color: #ddd; }
  #detail-panel .paper-item .paper-meta { font-size: 11px; color: #666; margin-top: 1px; }

  #detail-panel .conn-item {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
    cursor: pointer;
    transition: color 0.1s;
  }

  #detail-panel .conn-item:hover { color: #fff; }

  #detail-panel .topic-list, #detail-panel .journal-list {
    font-size: 12px;
    color: #999;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="header">
  <h1>Emory Data &amp; Decision Sciences — Research Network</h1>
  <p>Faculty connected by co-authorship, shared citations, topics, and journals</p>
</div>

<svg id="graph"></svg>

<div id="legend"></div>

<div id="controls">
  <button class="ctrl-btn active" data-edge="all">All edges</button>
  <button class="ctrl-btn" data-edge="coauthor">Co-authored</button>
  <button class="ctrl-btn" data-edge="refs">Shared refs</button>
  <button class="ctrl-btn" data-edge="topics">Shared topics</button>
</div>

<div id="weight-control">
  <label>Min edge weight</label>
  <input type="range" id="weight-slider" min="0" max="100" value="6">
  <div class="val">Showing edges with weight &ge; <span id="weight-val">6</span></div>
</div>

<div id="tooltip"></div>
<div id="edge-tooltip"></div>
<div id="detail-panel">
  <div class="panel-header">
    <h3 id="panel-title"></h3>
    <button class="panel-close" onclick="closePanel()">&times;</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const COLORS = {
  "Political Science": "#f97316",
  "Natural Language Processing": "#06b6d4",
  "Statistics / Causal Inference": "#8b5cf6",
  "Digital Humanities": "#ec4899",
  "Biology": "#22c55e",
  "Psychology": "#e879f9",
  "Machine Learning": "#3b82f6",
  "Formal Theory": "#84cc16",
  "Sociology": "#eab308",
  "Public Health": "#f59e0b",
  "Economics": "#14b8a6",
  "Philosophy": "#6366f1",
  "Anthropology": "#ef4444",
  "Other": "#64748b",
};

function nodeRadius(d) {
  return 14;
}

// Compute concentric ring radii so each ring's area is proportional to share.
// Returns array of {area, innerR, outerR} sorted smallest-inside to largest-outside.
function ringLayout(areas, R) {
  // Sort ascending: smallest share innermost (small circle), largest outermost (wide ring)
  const sorted = [...areas].sort((a, b) => a.share - b.share);
  if (sorted.length <= 1) {
    return [{ area: sorted[0].area, share: sorted[0].share, innerR: 0, outerR: R }];
  }
  const n = sorted.length;
  const sw = 0.5; // fixed inter-ring stroke width
  const hsw = sw / 2;
  // Compute boundaries so visible fill area (after stroke eats hsw from each side)
  // is proportional to share.
  const rings = [];
  for (let i = 0; i < n; i++) {
    const innerR = i === 0 ? 0 : rings[i - 1].outerR;
    const effInner = i === 0 ? 0 : innerR + hsw;
    const target = sorted[i].share * R * R;
    let outerR;
    if (i < n - 1) {
      outerR = Math.sqrt(target + effInner * effInner) + hsw;
    } else {
      outerR = Math.sqrt(target + effInner * effInner);
    }
    rings.push({ area: sorted[i].area, share: sorted[i].share, innerR, outerR });
  }
  // Scale to fit within R
  const scale = R / rings[n - 1].outerR;
  rings.forEach(r => { r.innerR *= scale; r.outerR *= scale; });
  return rings;
}

function nodeHasArea(d, area) {
  return d.areas && d.areas.some(a => a.area === area);
}

let graph, simulation, svg, g, link, node, label;
let edgeFilter = "all";
let weightThreshold = 6;
let highlightAreas = new Set();

async function init() {
  const resp = await fetch("data/graph.json");
  graph = await resp.json();

  // Seed initial positions by discipline area
  {
    const areaPos = {
      'Political Science':             {x: 0.16, y: 0.60},
      'Formal Theory':                 {x: 0.22, y: 0.38},
      'Philosophy':                    {x: 0.45, y: 0.35},
      'Economics':                     {x: 0.38, y: 0.25},
      'Sociology':                     {x: 0.52, y: 0.22},
      'Statistics / Causal Inference': {x: 0.52, y: 0.48},
      'Public Health':                 {x: 0.65, y: 0.28},
      'Anthropology':                  {x: 0.62, y: 0.38},
      'Natural Language Processing':   {x: 0.70, y: 0.40},
      'Machine Learning':              {x: 0.65, y: 0.55},
      'Biology':                       {x: 0.74, y: 0.22},
      'Psychology':                    {x: 0.74, y: 0.48},
      'Digital Humanities':            {x: 0.68, y: 0.52},
    };
    const W = Math.min(window.innerWidth, 900);
    const H = Math.round(W * 0.75);
    graph.nodes.forEach(n => {
      const p = areaPos[n.primary_area] || {x: 0.5, y: 0.5};
      n.x = p.x * W + (Math.random() - 0.5) * 60;
      n.y = p.y * H + (Math.random() - 0.5) * 60;
    });
  }

  // Load saved layout positions if available (overrides seed above)
  try {
    const layoutResp = await fetch("data/layout.json");
    if (layoutResp.ok) {
      const layout = await layoutResp.json();
      const pos = {};
      layout.forEach(p => pos[p.id] = p);
      const xs = layout.map(p => p.x), ys = layout.map(p => p.y);
      const xMin = Math.min(...xs), xMax = Math.max(...xs);
      const yMin = Math.min(...ys), yMax = Math.max(...ys);
      const margin = 60, topMargin = 100;
      const scale = Math.min(
        (window.innerWidth  - 2 * margin) / (xMax - xMin),
        (window.innerHeight - topMargin - margin) / (yMax - yMin)
      );
      const ox = margin - scale * xMin + (window.innerWidth  - 2*margin - scale*(xMax-xMin)) / 2;
      const oy = topMargin - scale * yMin + (window.innerHeight - topMargin - margin - scale*(yMax-yMin)) / 2;
      graph.nodes.forEach(n => {
        if (pos[n.id]) { n.x = scale * pos[n.id].x + ox; n.y = scale * pos[n.id].y + oy; }
      });
    }
  } catch(e) {}

  // Pre-compute edge count per node (for gravity on isolates)
  const edgeCount = {};
  graph.nodes.forEach(n => edgeCount[n.id] = 0);
  graph.edges.forEach(e => {
    edgeCount[e.source] = (edgeCount[e.source] || 0) + 1;
    edgeCount[e.target] = (edgeCount[e.target] || 0) + 1;
  });
  graph.nodes.forEach(n => n._edgeCount = edgeCount[n.id] || 0);

  const width  = Math.min(window.innerWidth, 900);
  const height = Math.round(width * 0.75);

  svg = d3.select("#graph")
    .attr("width", width)
    .attr("height", height);

  // Defs for glow
  const defs = svg.append("defs");
  const glow = defs.append("filter").attr("id", "glow");
  glow.append("feGaussianBlur").attr("stdDeviation", 2.5).attr("result", "blur");
  glow.append("feMerge").selectAll("feMergeNode")
    .data(["blur", "SourceGraphic"])
    .join("feMergeNode")
    .attr("in", d => d);

  g = svg.append("g");

  const zoom = d3.zoom()
    .scaleExtent([0.3, 5])
    .on("zoom", e => g.attr("transform", e.transform));
  svg.call(zoom);

  link = g.append("g").attr("class", "links").selectAll("line");
  node = g.append("g").attr("class", "nodes").selectAll("g");
  label = g.append("g").attr("class", "labels").selectAll("text");

  const AREA_X = {
    'Political Science':             0.16,
    'Formal Theory':                 0.22,
    'Philosophy':                    0.45,
    'Economics':                     0.38,
    'Sociology':                     0.52,
    'Statistics / Causal Inference': 0.52,
    'Public Health':                 0.65,
    'Anthropology':                  0.62,
    'Natural Language Processing':   0.70,
    'Machine Learning':              0.65,
    'Biology':                       0.74,
    'Psychology':                    0.74,
    'Digital Humanities':            0.68,
  };
  const AREA_Y = {
    'Political Science':             0.60,
    'Formal Theory':                 0.38,
    'Philosophy':                    0.35,
    'Economics':                     0.25,
    'Sociology':                     0.22,
    'Statistics / Causal Inference': 0.48,
    'Public Health':                 0.28,
    'Anthropology':                  0.38,
    'Natural Language Processing':   0.40,
    'Machine Learning':              0.55,
    'Biology':                       0.22,
    'Psychology':                    0.48,
    'Digital Humanities':            0.52,
  };

  simulation = d3.forceSimulation()
    .force("link", d3.forceLink().id(d => d.id).distance(d => {
      return 180 / Math.sqrt(Math.max(d.weight / 20, 0.5));
    }))
    .force("charge", d3.forceManyBody().strength(-420).distanceMax(400))
    .force("center", d3.forceCenter(width / 2, height * 0.50).strength(0.005))
    .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 9))
    .force("x", d3.forceX(d => {
      if (d._edgeCount <= 1) return width / 2;
      return (AREA_X[d.primary_area] || 0.5) * width;
    }).strength(d => d._edgeCount <= 1 ? 0.15 : 0.06))
    .force("y", d3.forceY(d => {
      if (d._edgeCount <= 1) return height / 2;
      return (AREA_Y[d.primary_area] || 0.5) * height;
    }).strength(d => d._edgeCount <= 1 ? 0.15 : 0.06))
    .force("bounds", function(alpha) {
      const padT = 75, padB = 35, padL = 55, padR = 80;
      simulation.nodes().forEach(function(n) {
        if (n.x < padL)              n.vx += (padL - n.x) * 0.04;
        if (n.x > width - padR)      n.vx -= (n.x - (width - padR)) * 0.04;
        if (n.y < padT)              n.vy += (padT - n.y) * 0.04;
        if (n.y > height - padB)     n.vy -= (n.y - (height - padB)) * 0.04;
      });
    });

  buildLegend();
  setupControls();
  update();

  setTimeout(() => {
    svg.transition().duration(800).call(
      zoom.transform,
      d3.zoomIdentity.translate(width * 0.1, height * 0.1).scale(0.85)
    );
  }, 2000);
}

function getFilteredEdges() {
  return graph.edges.filter(e => {
    if (edgeFilter === "coauthor") return e.coauthor_count > 0;
    if (edgeFilter === "refs") return e.shared_refs > 0;
    if (edgeFilter === "topics") return e.shared_topics > 0;
    return true;
  });
}

function getConnectedNodes(edges) {
  const connected = new Set();
  edges.forEach(e => {
    connected.add(typeof e.source === 'object' ? e.source.id : e.source);
    connected.add(typeof e.target === 'object' ? e.target.id : e.target);
  });
  return connected;
}

function update() {
  const filteredEdges = getFilteredEdges();
  const visibleNodes = graph.nodes;

  // Links
  link = link.data(filteredEdges, d =>
    `${typeof d.source === 'object' ? d.source.id : d.source}-${typeof d.target === 'object' ? d.target.id : d.target}`
  );
  link.exit().remove();
  const linkEnter = link.enter()
    .append("line")
    .on("mouseenter", showEdgeTooltip)
    .on("mouseleave", hideEdgeTooltip)
    .on("click", clickEdge)
    .style("cursor", "pointer");
  link = linkEnter.merge(link)
    .attr("stroke", "rgba(255,255,255,0.08)")
    .attr("stroke-width", d => d.boosted ? 1.5 : Math.max(Math.min(Math.sqrt(d.weight / 5), 6), 3))
;

  // Nodes
  node = node.data(visibleNodes, d => d.id);
  node.exit().remove();

  const nodeEnter = node.enter().append("g")
    .attr("class", "node-group")
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", dragStart)
      .on("drag", dragging)
      .on("end", dragEnd)
    )
    .on("mouseenter", (event, d) => { showTooltip(event, d); highlightNeighbors(d); })
    .on("mouseleave", (event, d) => { hideTooltip(); unhighlightNeighbors(); })
    .on("click", clickNode);

  // Draw concentric rings for each entering node
  nodeEnter.each(function(d) {
    const g = d3.select(this);
    const R = nodeRadius(d);
    const areas = d.areas && d.areas.length ? d.areas : [{area: "Other", share: 1}];
    const rings = ringLayout(areas, R);

    // Glow background circle
    g.append("circle")
      .attr("r", R)
      .attr("fill", "none")
      .attr("stroke", COLORS[d.primary_area] || COLORS["Other"])
      .attr("stroke-width", 1.5)
      .attr("stroke-opacity", 0.3)
      .attr("filter", "url(#glow)");

    // Concentric rings (draw outside-in so outer ring is behind)
    const arc = d3.arc().startAngle(0).endAngle(2 * Math.PI);
    g.selectAll(".ring-slice")
      .data(rings.slice().reverse())
      .join("path")
      .attr("class", "ring-slice")
      .attr("d", ring => arc({ innerRadius: ring.innerR, outerRadius: ring.outerR }))
      .attr("fill", ring => COLORS[ring.area] || COLORS["Other"])
      .attr("fill-opacity", 0.7)
      .attr("stroke", "#0a0e17")
      .attr("stroke-width", areas.length <= 1 ? 0 : 0.5);
  });

  node = nodeEnter.merge(node);

  // Labels (separate layer, renders above nodes)
  label = label.data(visibleNodes, d => d.id);
  label.exit().remove();
  const labelEnter = label.enter().append("text")
    .text(d => {
      const parts = d.id.split(" ");
      if (parts.length > 2) return parts[0][0] + ". " + parts.slice(-1)[0];
      return parts[0][0] + ". " + parts.slice(1).join(" ");
    })
    .attr("font-size", "11px")
    .attr("fill", "#aaa")
    .attr("font-weight", 500)
    .style("pointer-events", "none");
  label = labelEnter.merge(label);

  // Opacity logic
  applyOpacity();

  // Simulation — real edges obey weight threshold, boosted edges always active
  const simEdges = graph.edges.filter(e => {
    if (e.boosted) return true;
    if (e.weight < weightThreshold) return false;
    if (edgeFilter === "coauthor") return e.coauthor_count > 0;
    if (edgeFilter === "refs") return e.shared_refs > 0;
    if (edgeFilter === "topics") return e.shared_topics > 0;
    return true;
  });
  simulation.nodes(visibleNodes);
  simulation.force("link").links(simEdges);
  simulation.alpha(0.5).restart();

  simulation.on("tick", () => {
    const W = +svg.attr("width"), H = +svg.attr("height");
    const clampT = 70, clampB = 15, clampL = 40, clampR = 55;
    simulation.nodes().forEach(n => {
      if (n.x < clampL)     { n.x = clampL;     n.vx = Math.max(0, n.vx); }
      if (n.x > W - clampR) { n.x = W - clampR; n.vx = Math.min(0, n.vx); }
      if (n.y < clampT)     { n.y = clampT;     n.vy = Math.max(0, n.vy); }
      if (n.y > H - clampB) { n.y = H - clampB; n.vy = Math.min(0, n.vy); }
    });
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
    label
      .attr("x", d => d.x > W * 0.78 ? d.x - nodeRadius(d) - 5 : d.x + nodeRadius(d) + 5)
      .attr("text-anchor", d => d.x > W * 0.78 ? "end" : "start")
      .attr("y", d => d.y + 4);
  });
}

function nodeMatchesAreas(d) {
  return d.areas && d.areas.some(a => highlightAreas.has(a.area));
}

function applyOpacity() {
  if (highlightAreas.size > 0) {
    node.selectAll(".ring-slice")
      .attr("fill-opacity", function() {
        const d = d3.select(this.parentNode).datum();
        return nodeMatchesAreas(d) ? 0.85 : 0.06;
      });
    node.select("circle")
      .attr("stroke-opacity", function() {
        const d = d3.select(this.parentNode).datum();
        return nodeMatchesAreas(d) ? 0.3 : 0.03;
      });
    node.select("text")
      .attr("opacity", d => nodeMatchesAreas(d) ? 1 : 0.08);
    link.attr("opacity", d => {
      const s = typeof d.source === 'object' ? d.source : null;
      const t = typeof d.target === 'object' ? d.target : null;
      if (!s || !t) return 0.03;
      return (nodeMatchesAreas(s) || nodeMatchesAreas(t)) ? 1 : 0.03;
    });
  } else {
    node.selectAll(".ring-slice").attr("fill-opacity", 0.7);
    node.select("circle").attr("stroke-opacity", 0.3);
    node.select("text").attr("opacity", 1);
    link.attr("opacity", 1);
  }
}

function buildLegend() {
  const legend = d3.select("#legend");
  legend.append("h3").text("Research areas");

  Object.entries(COLORS).forEach(([name, color]) => {
    if (name === "Other") return;
    // Count nodes that have ANY share in this area
    const count = graph.nodes.filter(n => nodeHasArea(n, name)).length;
    const item = legend.append("div")
      .attr("class", "legend-item")
      .on("click", () => {
        if (highlightAreas.has(name)) highlightAreas.delete(name);
        else highlightAreas.add(name);
        d3.selectAll(".legend-item").classed("dimmed", function() {
          if (highlightAreas.size === 0) return false;
          return !highlightAreas.has(this.dataset.cluster);
        });
        applyOpacity();
      });
    item.node().dataset.cluster = name;
    item.append("div").attr("class", "legend-dot").style("background", color);
    item.append("span").text(name);
  });
}

function setupControls() {
  d3.selectAll(".ctrl-btn[data-edge]").on("click", function() {
    d3.selectAll(".ctrl-btn[data-edge]").classed("active", false);
    d3.select(this).classed("active", true);
    edgeFilter = this.dataset.edge;
    update();
  });

  d3.select("#weight-slider").on("input", function() {
    weightThreshold = +this.value;
    d3.select("#weight-val").text(this.value);
    update();
  });
}

function showTooltip(event, d) {
  const tip = d3.select("#tooltip");
  let html = `<h4>${d.id}</h4>`;

  // Area tags — show all areas
  if (d.areas && d.areas.length) {
    html += `<div class="area-tags">`;
    d.areas.forEach(a => {
      const color = COLORS[a.area] || COLORS["Other"];
      const pct = Math.round(a.share * 100);
      html += `<span class="area-tag" style="background:${color}33;color:${color}">${a.area} ${pct}%</span>`;
    });
    html += `</div>`;
  }

  if (d.interests && d.interests.length) {
    html += `<div class="topics">${d.interests.slice(0, 5).join(" &middot; ")}</div>`;
  }
  tip.html(html)
    .style("left", (event.clientX + 16) + "px")
    .style("top", (event.clientY - 10) + "px")
    .classed("visible", true);
}

function hideTooltip() {
  d3.select("#tooltip").classed("visible", false);
}

function showEdgeTooltip(event, d) {
  const tip = d3.select("#edge-tooltip");
  const src = typeof d.source === 'object' ? d.source.id : d.source;
  const tgt = typeof d.target === 'object' ? d.target.id : d.target;

  let html = `<h4>${src} &harr; ${tgt}</h4>`;
  if (d.coauthor_count) html += `<div class="edge-detail">co-authored ${d.coauthor_count} papers</div>`;
  if (d.shared_topics) html += `<div class="edge-detail">${d.shared_topics} shared topics</div>`;
  if (d.shared_journals) html += `<div class="edge-detail">${d.shared_journals} shared journals</div>`;
  if (d.coauthor_papers && d.coauthor_papers.length) {
    html += `<div class="paper-list"><strong>Papers:</strong><br>`;
    html += d.coauthor_papers.slice(0, 5).map(p => `&middot; ${p}`).join("<br>");
    if (d.coauthor_papers.length > 5) html += `<br>&hellip; and ${d.coauthor_papers.length - 5} more`;
    html += `</div>`;
  }

  tip.html(html)
    .style("left", (event.clientX + 16) + "px")
    .style("top", (event.clientY - 10) + "px")
    .classed("visible", true);
}

function hideEdgeTooltip() {
  d3.select("#edge-tooltip").classed("visible", false);
}

let hoverHighlightActive = false;

function highlightNeighbors(d) {
  if (document.getElementById("detail-panel").classList.contains("open")) return;
  hoverHighlightActive = true;
  const neighbors = new Set();
  const filteredEdges = getFilteredEdges();
  filteredEdges.forEach(e => {
    const src = typeof e.source === 'object' ? e.source.id : e.source;
    const tgt = typeof e.target === 'object' ? e.target.id : e.target;
    if (src === d.id) neighbors.add(tgt);
    if (tgt === d.id) neighbors.add(src);
  });
  neighbors.add(d.id);

  node.selectAll(".ring-slice")
    .attr("fill-opacity", function() {
      const nd = d3.select(this.parentNode).datum();
      return neighbors.has(nd.id) ? 0.85 : 0.06;
    });
  node.select("circle")
    .attr("stroke-opacity", function() {
      const nd = d3.select(this.parentNode).datum();
      return neighbors.has(nd.id) ? 0.3 : 0.03;
    });
  node.select("text")
    .attr("opacity", n => neighbors.has(n.id) ? 1 : 0.08);
  link.attr("opacity", e => {
    const src = typeof e.source === 'object' ? e.source.id : e.source;
    const tgt = typeof e.target === 'object' ? e.target.id : e.target;
    return (src === d.id || tgt === d.id) ? 1 : 0.03;
  });
}

function unhighlightNeighbors() {
  if (!hoverHighlightActive) return;
  hoverHighlightActive = false;
  applyOpacity();
}

let panelTarget = null;

function clickNode(event, d) {
  event.stopPropagation();
  hideTooltip();
  if (panelTarget === d.id) { closePanel(); return; }
  showNodePanel(d);
}

function clickEdge(event, d) {
  event.stopPropagation();
  hideEdgeTooltip();
  const src = typeof d.source === 'object' ? d.source.id : d.source;
  const tgt = typeof d.target === 'object' ? d.target.id : d.target;
  const key = `${src}--${tgt}`;
  if (panelTarget === key) { closePanel(); return; }
  showEdgePanel(d);
}

function showNodePanel(d) {
  panelTarget = d.id;
  const panel = document.getElementById("detail-panel");
  document.getElementById("panel-title").textContent = d.id;

  const filteredEdges = getFilteredEdges();
  let html = "";

  // Area tags
  if (d.areas && d.areas.length) {
    html += `<div class="panel-section"><div class="panel-tags">`;
    d.areas.forEach(a => {
      const color = COLORS[a.area] || COLORS["Other"];
      const pct = Math.round(a.share * 100);
      html += `<span class="panel-tag" style="background:${color}33;color:${color}">${a.area} ${pct}%</span>`;
    });
    html += `</div></div>`;
  }

  // Stats
  html += `<div class="panel-section">`;
  if (d.website) {
    html += `<a class="panel-link" href="${d.website}" target="_blank">Personal website &rarr;</a><br>`;
  }
  if (d.scholar_id) {
    html += `<a class="panel-link" href="https://scholar.google.com/citations?user=${d.scholar_id}" target="_blank">Google Scholar &rarr;</a>`;
  }
  html += `</div>`;

  // Research interests
  if (d.interests && d.interests.length) {
    html += `<div class="panel-section"><h4>Research Interests</h4>`;
    html += `<div class="topic-list">${d.interests.join(" &middot; ")}</div></div>`;
  }

  // Top publications
  if (d.top_pubs && d.top_pubs.length) {
    html += `<div class="panel-section"><h4>Recent Work</h4>`;
    d.top_pubs.forEach(p => {
      html += `<div class="paper-item"><div class="paper-title">${p.title}</div>`;
      html += `<div class="paper-meta">${p.year || ""}</div></div>`;
    });
    html += `</div>`;
  }

  // Strongest connections
  const connections = [];
  filteredEdges.forEach(e => {
    const src = typeof e.source === 'object' ? e.source.id : e.source;
    const tgt = typeof e.target === 'object' ? e.target.id : e.target;
    if (src === d.id) connections.push({ name: tgt, weight: e.weight, edge: e });
    if (tgt === d.id) connections.push({ name: src, weight: e.weight, edge: e });
  });
  connections.sort((a, b) => b.weight - a.weight);

  if (connections.length) {
    html += `<div class="panel-section"><h4>Connections in the Department</h4>`;
    connections.slice(0, 8).forEach(c => {
      const bits = [];
      if (c.edge.coauthor_count) bits.push(`co-authored ${c.edge.coauthor_count} paper${c.edge.coauthor_count > 1 ? "s" : ""}`);
      else if (c.edge.website_coauthor) bits.push("work in progress together");
      if (c.edge.shared_topics) bits.push(`${c.edge.shared_topics} shared topics`);
      if (c.edge.shared_journals) bits.push(`${c.edge.shared_journals} shared journals`);
      const detail = bits.length ? bits.join(", ") : "related research";
      html += `<div class="conn-item" data-name="${c.name}">${c.name}<span style="color:#555"> &mdash; ${detail}</span></div>`;
    });
    html += `</div>`;
  }

  document.getElementById("panel-body").innerHTML = html;
  panel.classList.add("open");

  // Make connection items clickable — open that node's panel
  panel.querySelectorAll(".conn-item[data-name]").forEach(el => {
    el.addEventListener("click", () => {
      const target = graph.nodes.find(n => n.id === el.dataset.name);
      if (target) showNodePanel(target);
    });
  });

  // Click background to close
  svg.on("click.panel", function(ev) {
    if (ev.target.tagName === "svg" || ev.target === this) {
      closePanel();
    }
  });
}

function showEdgePanel(d) {
  const src = typeof d.source === 'object' ? d.source.id : d.source;
  const tgt = typeof d.target === 'object' ? d.target.id : d.target;
  panelTarget = `${src}--${tgt}`;

  const panel = document.getElementById("detail-panel");
  document.getElementById("panel-title").innerHTML = `${src} &harr; ${tgt}`;

  let html = "";

  // Summary line
  const summaryBits = [];
  if (d.coauthor_count) summaryBits.push(`co-authored ${d.coauthor_count} paper${d.coauthor_count > 1 ? "s" : ""}`);
  else if (d.website_coauthor) summaryBits.push("have joint work in progress");
  if (d.shared_topics) summaryBits.push(`${d.shared_topics} shared research topics`);
  if (d.shared_journals) summaryBits.push(`${d.shared_journals} shared journals`);
  if (d.shared_refs) summaryBits.push(`cite ${d.shared_refs} of the same papers`);
  if (summaryBits.length) {
    html += `<div class="panel-section"><div class="panel-stat">${summaryBits.join(" &middot; ")}</div></div>`;
  }

  // Co-authored papers
  if (d.coauthor_papers && d.coauthor_papers.length) {
    html += `<div class="panel-section"><h4>Papers Written Together</h4>`;
    d.coauthor_papers.forEach(p => {
      html += `<div class="paper-item"><div class="paper-title">${p}</div></div>`;
    });
    html += `</div>`;
  }

  // Shared topics
  if (d.shared_topic_names && d.shared_topic_names.length) {
    html += `<div class="panel-section"><h4>Research Topics in Common</h4>`;
    html += `<div class="topic-list">${d.shared_topic_names.join(" &middot; ")}</div></div>`;
  }

  // Shared journals
  if (d.shared_journal_names && d.shared_journal_names.length) {
    html += `<div class="panel-section"><h4>Both Publish In</h4>`;
    html += `<div class="journal-list">${d.shared_journal_names.join(" &middot; ")}</div></div>`;
  }

  // Shared references (resolved titles)
  if (d.shared_ref_papers && d.shared_ref_papers.length) {
    html += `<div class="panel-section"><h4>Papers Both Have Cited</h4>`;
    d.shared_ref_papers.forEach(p => {
      html += `<div class="paper-item"><div class="paper-title">${p.title || "Untitled"}</div>`;
      const meta = [p.year, p.authors ? p.authors.join(", ") : ""].filter(Boolean).join(" &middot; ");
      if (meta) html += `<div class="paper-meta">${meta}</div>`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  // Links to each person
  const srcNode = graph.nodes.find(n => n.id === src);
  const tgtNode = graph.nodes.find(n => n.id === tgt);
  html += `<div class="panel-section"><h4>View Profile</h4>`;
  [srcNode, tgtNode].forEach(n => {
    if (n) {
      html += `<div class="conn-item" data-name="${n.id}">${n.id}</div>`;
    }
  });
  html += `</div>`;

  document.getElementById("panel-body").innerHTML = html;
  panel.classList.add("open");

  // Make profile links clickable
  panel.querySelectorAll(".conn-item[data-name]").forEach(el => {
    el.addEventListener("click", () => {
      const target = graph.nodes.find(n => n.id === el.dataset.name);
      if (target) showNodePanel(target);
    });
  });

  svg.on("click.panel", function(ev) {
    if (ev.target.tagName === "svg" || ev.target === this) {
      closePanel();
    }
  });
}

function closePanel() {
  panelTarget = null;
  document.getElementById("detail-panel").classList.remove("open");
  svg.on("click.panel", null);
  applyOpacity();
}

function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragging(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

// Console helper: saveLayout() — copies current node positions as JSON
window.saveLayout = function() {
  const layout = graph.nodes.map(n => ({id: n.id, x: Math.round(n.x * 10) / 10, y: Math.round(n.y * 10) / 10}));
  const json = JSON.stringify(layout, null, 2);
  navigator.clipboard.writeText(json).then(() => console.log("Layout copied to clipboard! Paste into data/layout.json"));
  return layout;
};

init();
</script>
